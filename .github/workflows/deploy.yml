name: Build, Push and Update GitOps

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/dreis2003/springboot-demo-ci
  GITOPS_REPO: dreis2003/homelab-gitops
  GITOPS_PATH: springboot-demo/deployment.yaml

jobs:
  build-and-update-gitops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: homelab-gitops

      - name: Update image tag in GitOps repo
        run: |
          cd homelab-gitops
          sed -i "s|image: ghcr.io/dreis2003/springboot-demo-ci:.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" ${{ env.GITOPS_PATH }}

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ${{ env.GITOPS_PATH }}
          git commit -m "Update springboot-demo image to ${{ github.sha }}"
          git push